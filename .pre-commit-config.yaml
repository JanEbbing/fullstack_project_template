repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Rust Format Check
        entry: bash -c 'cd backend && cargo fmt -- --check'
        language: system
        pass_filenames: false
        files: '\.rs$'
      - id: prettier-check
        name: Frontend Format Check
        entry: bash -c 'cd frontend && npx prettier --check .'
        language: system
        pass_filenames: false
        files: '\.(ts|js|svelte|css|html|json)$'
